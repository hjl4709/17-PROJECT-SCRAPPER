<html>
  <head>
    <title>잡스크래퍼</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
  </head>
  <body>
    <main class="container">
      <h1>17기 잡스크래퍼입니다.</h1>
      <div>
        <form action="/search">
          <input name="keyword" placeholder="검색어를 입력하세요" required />
          <select name="page" required>
            <option value="1" selected>1 페이지 (기본 - 빠름)</option>
            <option value="2">2 페이지</option>
            <option value="3">3 페이지</option>
            <option value="4">4 페이지</option>
            <option value="5">5 페이지 (오래 걸림)</option>
          </select>

          <button class="outline">검색하기</button>
        </form>
      </div>
    </main>
  </body>
</html>
