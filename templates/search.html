<html>
  <head>
    <title>검색결과 | 잡스크래퍼</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
  </head>

  <body>
    <main class="container">
      <h1>{{ count }}개의 "{{ keyword }}" 검색 결과입니다.</h1>
      <p>인크루트, 잡플래닛 사이트의 검색결과를 확인할 수 있습니다.</p>
      <a href= "/file?keyword={{ keyword }}">
      <button>데이터 다운로드</button>
      </a>
      <table>
        <thead data-theme="light">
          <tr>
            <th>사이트</th>
            <th>No</th>
            <th>회사</th>
            <th>공고제목</th>
            <th>지역</th>
            <th>마감일</th>
          </tr>
        </thead>
        <tbody>
          {% for i, job in jobs %}
          <tr>
            <td>{{job["site"]}}</td>
            <td>{{i+1}}</td>
            <td>{{job["company"]}}</td>
            <td><a href="{{job['link']}}" target="_blank">
                {{job["title"]}}</td></a>
            <td>{{job["region"]}}</td>
            <td>{{job["date"]}}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </main>
  </body>
</html>
